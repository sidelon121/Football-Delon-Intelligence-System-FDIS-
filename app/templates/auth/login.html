<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Football Data Intelligence System — Transform football data into interactive insights">
    <title>Login - FIDS — Football Intelligence Delon System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚽</div>
                <div>
                    <h1>FIDS</h1>
                    <div class="brand-sub">Football Intelligence
                        by SIDELON121
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Overview</div>
                    <a href="/"
                        class="nav-link ">
                        <span class="nav-icon">📊</span> Dashboard
                    </a>
                    <a href="/dashboard"
                        class="nav-link ">
                        <span class="nav-icon">📈</span> Analytics
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Data</div>
                    <a href="/upload"
                        class="nav-link ">
                        <span class="nav-icon">📁</span> Upload Data
                    </a>
                    <a href="/matches"
                        class="nav-link ">
                        <span class="nav-icon">🏟️</span> Matches
                    </a>
                    <a href="/teams"
                        class="nav-link ">
                        <span class="nav-icon">👥</span> Teams
                    </a>
                    <a href="/players"
                        class="nav-link ">
                        <span class="nav-icon">⭐</span> Players
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Tools</div>
                    <a href="/compare"
                        class="nav-link ">
                        <span class="nav-icon">⚖️</span> Compare
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div style="display:flex;align-items:center;gap:17px">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                    <span class="header-title">Dashboard</span>
                </div>
                <div class="header-actions">
                    
                    <a href="/auth/login" class="btn btn-outline btn-sm">Login</a>
                    <a href="/auth/register" class="btn btn-accent btn-sm">Register</a>
                    
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to your FDIS account</p>
        </div>

        
            
        

        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="name@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
            </div>

            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>

        <div class="auth-divider">
            <span>Or continue with</span>
        </div>

        <div class="social-auth">
            <a href="/auth/login/google" class="btn btn-outline w-full mb-2">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                Google
            </a>
            <a href="/auth/login/github" class="btn btn-outline w-full">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="18" alt="GitHub">
                GitHub
            </a>
        </div>

        <p class="auth-footer">
            Don't have an account? <a href="/auth/register">Create one</a>
        </p>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
}
.auth-card {
    background: var(--card-bg, #1c17df00);
    padding: 2.5rem;
    border-radius: 1rem;
    box-shadow: 0 10px 25px rgb(37 21 233);
    width: 100%;
    max-width: 400px;
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-header h2 {
    margin-bottom: 0.5rem;
    color: var(--text-main);
}
.auth-divider {
    text-align: center;
    margin: 1.5rem 0;
    position: relative;
}
.auth-divider::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #eee;
    z-index: 1;
}
.auth-divider span {
    background: var(--card-bg, #fff);
    padding: 0 10px;
    position: relative;
    z-index: 2;
    color: #888;
    font-size: 0.9rem;
}
.social-auth {
    margin-bottom: 1.5rem;
}
.social-auth .btn img {
    margin-right: 10px;
}
.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #666;
}
.w-full { width: 100%; }
.mb-2 { margin-bottom: 0.5rem; }
</style>

            </div>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const chartContainers = document.querySelectorAll(".chart-container");

            chartContainers.forEach(container => {
                const chartData = container.getAttribute("data-chart");

                if (chartData) {
                    try {
                        const parsed = JSON.parse(chartData);
                        Plotly.newPlot(container, parsed.data, parsed.layout);
                    } catch (e) {
                        console.error("Chart render error:", e);
                    }
                }
            });
        });
    </script>
</body>

</html>
